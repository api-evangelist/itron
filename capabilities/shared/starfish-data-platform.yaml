name: Starfish Data Platform Shared Capability
description: |
  Per-API shared capability for the Itron Starfish Data Platform. Establishes the
  base URL, authentication, headers, and resource families that workflow-level
  capability compositions in `capabilities/` build on.
url: https://github.com/api-evangelist/itron/capabilities/shared/starfish-data-platform.yaml
created: '2026-05-23'
modified: '2026-05-23'

api:
  name: Itron Starfish Data Platform
  baseUrl: https://api.data.sentience.ssni.com
  spec: ../../openapi/starfish-data-platform-openapi.yml
  documentation: https://developer.ssni.com/api-overview
  sdk: https://github.com/silverspringnetworks/starfish-js

auth:
  type: bearer
  scheme: OAuth 2.0 client credentials or short-lived Tokens API token
  envVar: STARFISH_BEARER_TOKEN
  tokenEndpoint: /api/tokens
  bootstrap:
    clientIdEnv: STARFISH_CLIENT_ID
    clientSecretEnv: STARFISH_CLIENT_SECRET

headers:
  X-Starfish-Solution: ${STARFISH_SOLUTION:-production}

resources:

- name: Devices
  operations:
  - operationId: getDevices
    method: GET
    path: /api/devices
  - operationId: postDevice
    method: POST
    path: /api/devices
  - operationId: queryDevices
    method: POST
    path: /api/devices/query

- name: Observations
  operations:
  - operationId: getObservations
    method: GET
    path: /api/observations
  - operationId: queryObservations
    method: POST
    path: /api/observations/query
  - operationId: getDeviceObservations
    method: GET
    path: /api/devices/{deviceId}/observations
  - operationId: postDeviceObservation
    method: POST
    path: /api/devices/{deviceId}/observations
  - operationId: queryDeviceObservations
    method: POST
    path: /api/devices/{deviceId}/observations/query

- name: Device Templates
  operations:
  - operationId: getDeviceTemplates
    method: GET
    path: /api/device-templates
  - operationId: postDeviceTemplate
    method: POST
    path: /api/device-templates
  - operationId: putDeviceTemplate
    method: PUT
    path: /api/device-templates/{templateId}
  - operationId: getStaticTemplates
    method: GET
    path: /api/device-templates/static

guardrails:
- description: Never invoke data-plane operations without first ensuring a fresh bearer token exists.
- description: Default to the sandbox solution unless STARFISH_SOLUTION=production is explicitly set.
- description: Cap pagination loops at 100 pages to avoid runaway observation pulls.
